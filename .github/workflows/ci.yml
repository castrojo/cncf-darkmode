name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Type check
        run: npx astro check
      - name: Build
        run: npm run build
        # Note: E2E and cross-site Playwright tests are run manually via `just test-e2e` / `just test-cross-site`

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Go tests
        run: cd go && go test -race ./...
