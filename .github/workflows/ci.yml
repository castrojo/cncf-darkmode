name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  site-kit:
    name: "Test @cncf/site-kit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run site-kit unit tests
        run: npm run test --workspace=packages/site-kit

  go:
    name: "Test Go backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Build all binaries
        run: cd go && go build ./...
      - name: Run tests with race detector
        run: cd go && go test -race -count=1 ./...

  projects:
    name: "Build & Test projects site"
    runs-on: ubuntu-latest
    needs: [site-kit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run projects unit tests
        run: npm run test --workspace=sites/projects
      - name: Build projects site
        run: npm run build --workspace=sites/projects

  endusers:
    name: "Build & Test endusers site"
    runs-on: ubuntu-latest
    needs: [site-kit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run endusers unit tests
        run: npm run test --workspace=sites/endusers
      - name: Build endusers site
        run: npm run build --workspace=sites/endusers

  performance-budget:
    name: "Performance budget check"
    runs-on: ubuntu-latest
    needs: [projects, endusers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build both sites
        run: |
          npm run build --workspace=sites/projects
          npm run build --workspace=sites/endusers
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run performance budget tests
        run: npx playwright test tests/cross-site/performance.spec.ts tests/cross-site/fixtures-audit.spec.ts --config tests/cross-site/playwright.config.ts

  privacy-guard:
    name: "Privacy guard (no PII in people output)"
    runs-on: ubuntu-latest
    needs: [go]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Build sync-people binary
        run: cd go && go build ./cmd/sync-people/
      - name: Check for PII fields in people data
        run: |
          if [ -d "sites/people/src/data" ]; then
            if grep -rE '"email"|"wechat"' sites/people/src/data/ 2>/dev/null; then
              echo "PRIVACY VIOLATION: email or wechat field found in people data output"
              exit 1
            fi
            echo "Privacy check passed"
          else
            echo "sites/people/src/data not present yet (Phase 5 pending) - skipping"
          fi
