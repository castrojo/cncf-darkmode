name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Type check
        run: npx astro check
      - name: Build
        run: npm run build

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Go tests
        run: cd go && go test -race ./...

  playwright-smoke:
    name: Playwright E2E smoke (cross-site)
    runs-on: ubuntu-latest
    needs: [test, test-go]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (required for astro preview)
        run: npm run build

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run cross-site smoke tests
        run: npx playwright test --config tests/cross-site/playwright.ci.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
