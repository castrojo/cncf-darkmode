name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  site-kit:
    name: Test @cncf/site-kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test --workspace=packages/site-kit

  go:
    name: Test Go backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: cd go && go test -race ./...

  projects:
    name: Build projects site
    runs-on: ubuntu-latest
    needs: [site-kit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=sites/projects

  endusers:
    name: Build endusers site
    runs-on: ubuntu-latest
    needs: [site-kit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=sites/endusers
