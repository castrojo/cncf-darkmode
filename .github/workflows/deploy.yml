name: Deploy

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    name: "Sync data"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Run sync-projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd go && go run ./cmd/sync-projects/
      - name: Run sync-endusers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd go && go run ./cmd/sync-endusers/
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync data [skip ci]"
            git push
          fi

  build:
    name: "Build all sites"
    runs-on: ubuntu-latest
    needs: [sync]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build site-kit
        run: npm run build --workspace=packages/site-kit
      - name: Copy data to public/ (required for client-side fetch)
        run: |
          mkdir -p sites/projects/public/data
          cp sites/projects/src/data/projects.json sites/projects/public/data/
          cp sites/projects/src/data/changelog.json sites/projects/public/data/
          mkdir -p sites/endusers/public/data
          cp sites/endusers/src/data/members.json sites/endusers/public/data/
          cp sites/endusers/src/data/changelog.json sites/endusers/public/data/
          cp sites/endusers/src/data/architectures.json sites/endusers/public/data/
      - name: Build projects site
        run: npm run build --workspace=sites/projects
      - name: Build endusers site
        run: npm run build --workspace=sites/endusers
      - name: Combine into single artifact
        run: |
          mkdir -p dist
          cp -r sites/projects/dist/. dist/
          mkdir -p dist/members
          cp -r sites/endusers/dist/. dist/members/
          mkdir -p dist/endusers-website
          cat > dist/endusers-website/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0;url=/cncf-darkmode/members/" />
            <title>Redirecting to CNCF Members…</title>
            <link rel="canonical" href="/cncf-darkmode/members/" />
          </head>
          <body>
            <p>Redirecting to <a href="/cncf-darkmode/members/">/cncf-darkmode/members/</a>…</p>
          </body>
          </html>
          EOF
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
