name: Deploy

# This is the single deployment workflow for the cncf-darkmode monorepo.
# It deploys ALL THREE sections of the unified Astro site:
#   - Projects  (src/pages/index.astro)
#   - Members   (src/pages/members/index.astro)
#   - People    (src/pages/people/index.astro)
#
# The legacy deploy-people.yml workflow was removed (SO-18, commit 7166a0f).
# The sites/people/ path it referenced no longer exists after the monorepo
# migration — People is served exclusively from this workflow.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    name: "Sync data"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Run sync-projects
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cd go && go run ./cmd/sync-projects/
      - name: Run sync-endusers
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cd go && go run ./cmd/sync-endusers/
      - name: Run sync-people
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cd go && go run ./cmd/sync-people/
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync data [skip ci]"
            git push
          fi

  build:
    name: "Build site"
    runs-on: ubuntu-latest
    needs: [sync]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Copy data to public/
        run: |
          mkdir -p public/data/projects public/data/members public/data/people
          cp src/data/projects/projects.json public/data/projects/ 2>/dev/null || true
          cp src/data/projects/changelog.json public/data/projects/ 2>/dev/null || true
          cp src/data/members/members.json public/data/members/ 2>/dev/null || true
          cp src/data/members/changelog.json public/data/members/ 2>/dev/null || true
          cp src/data/members/architectures.json public/data/members/ 2>/dev/null || true
          cp src/data/people/people-index.json public/data/people/ 2>/dev/null || true
          cp src/data/people/people-emeritus.json public/data/people/ 2>/dev/null || true
          node -e "const d=JSON.parse(require('fs').readFileSync('src/data/people/people-index.json','utf8'));require('fs').writeFileSync('public/data/people/staff-index.json',JSON.stringify(d.filter(p=>Array.isArray(p.category)&&p.category.includes('Staff'))));" 2>/dev/null || true
          cp src/data/people/heroes.json public/data/people/ 2>/dev/null || true
          cp src/data/people/changelog.json public/data/people/ 2>/dev/null || true
          cp src/data/people/landscape_logos.json public/data/people/ 2>/dev/null || true
          cp src/data/people/maintainers.json public/data/people/ 2>/dev/null || true
      - name: Build site
        run: npm run build
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Test gate (Gap G4 — SO-16):
  # A bad sync (malformed JSON, missing data files) can produce a build that
  # passes `astro build` yet serves broken data at runtime.  Running the full
  # unit-test suite (290 tests) against the freshly-synced data gives us a
  # structural/schema check for free: any malformed JSON causes an import
  # error; any schema violation is caught by the schema tests.  Only when
  # every test is green do we allow the deploy job to proceed.
  test:
    name: "Unit test gate"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        # Runs all vitest unit tests (npm run test = vitest run).
        # Workflow exits non-zero here if any test fails; the deploy job
        # is blocked by `needs: [test]` and will not run.
        run: npm run test

  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: [test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
